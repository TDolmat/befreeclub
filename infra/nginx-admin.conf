# SPA panelu admina. Same statyki - /api/*, /ws i /health* kieruje Caddy hosta
# bezposrednio do bfc-backend:3000 (split routing per domena), nginx ich nie widzi.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    # index.html zawsze swiezy - nowy deploy widoczny od razu, bez twardego cache.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Pliki z hashem w nazwie - cache na rok.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: nieznana sciezka dostaje index.html (routing po stronie Reacta).
    location / {
        try_files $uri /index.html;
    }
}
